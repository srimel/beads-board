<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Main marble body gradient: deep brown to rich red -->
    <radialGradient id="marble" cx="0.4" cy="0.35" r="0.55" fx="0.35" fy="0.3">
      <stop offset="0%" stop-color="#e85040"/>
      <stop offset="35%" stop-color="#c0302a"/>
      <stop offset="65%" stop-color="#8b1a1a"/>
      <stop offset="85%" stop-color="#5c1010"/>
      <stop offset="100%" stop-color="#3a0a0a"/>
    </radialGradient>
    <!-- Glossy highlight on top-left -->
    <radialGradient id="shine" cx="0.35" cy="0.3" r="0.3" fx="0.3" fy="0.25">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <!-- Secondary warm highlight for depth -->
    <radialGradient id="warmshine" cx="0.55" cy="0.6" r="0.35" fx="0.55" fy="0.6">
      <stop offset="0%" stop-color="#ff9060" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff9060" stop-opacity="0"/>
    </radialGradient>
    <!-- Brown swirl accent -->
    <radialGradient id="swirl" cx="0.6" cy="0.5" r="0.4" fx="0.6" fy="0.5">
      <stop offset="0%" stop-color="#7a4422" stop-opacity="0.5"/>
      <stop offset="60%" stop-color="#5c3318" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#5c3318" stop-opacity="0"/>
    </radialGradient>
    <!-- Rim light for 3D pop -->
    <radialGradient id="rim" cx="0.5" cy="0.5" r="0.5">
      <stop offset="80%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="95%" stop-color="#000000" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.3"/>
    </radialGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Marble body -->
  <circle cx="32" cy="32" r="28" fill="url(#marble)" filter="url(#shadow)"/>
  <!-- Brown swirl detail -->
  <circle cx="32" cy="32" r="28" fill="url(#swirl)"/>
  <!-- Warm secondary highlight -->
  <circle cx="32" cy="32" r="28" fill="url(#warmshine)"/>
  <!-- Rim darkening for spherical depth -->
  <circle cx="32" cy="32" r="28" fill="url(#rim)"/>
  <!-- Primary gloss/shine -->
  <circle cx="32" cy="32" r="28" fill="url(#shine)"/>
  <!-- Small specular highlight dot -->
  <ellipse cx="24" cy="22" rx="5" ry="4" fill="#ffffff" opacity="0.5"/>
</svg>
