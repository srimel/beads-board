<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <!-- Canvas sack texture gradient -->
    <linearGradient id="sack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d4a855"/>
      <stop offset="30%" stop-color="#c49540"/>
      <stop offset="60%" stop-color="#b8863a"/>
      <stop offset="100%" stop-color="#a07030"/>
    </linearGradient>
    <!-- Sack shading for depth -->
    <radialGradient id="sackShade" cx="0.4" cy="0.5" r="0.55">
      <stop offset="0%" stop-color="#ddb560" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#704820" stop-opacity="0.4"/>
    </radialGradient>
    <!-- Marble gradients -->
    <radialGradient id="mRed" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#ff6b5b"/><stop offset="50%" stop-color="#cc2020"/><stop offset="100%" stop-color="#8b1010"/>
    </radialGradient>
    <radialGradient id="mBlue" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#6bb5ff"/><stop offset="50%" stop-color="#2060cc"/><stop offset="100%" stop-color="#103880"/>
    </radialGradient>
    <radialGradient id="mGreen" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#7ee787"/><stop offset="50%" stop-color="#2ea043"/><stop offset="100%" stop-color="#1a6030"/>
    </radialGradient>
    <radialGradient id="mGold" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#ffe066"/><stop offset="50%" stop-color="#e8a820"/><stop offset="100%" stop-color="#a07010"/>
    </radialGradient>
    <radialGradient id="mPurple" cx="0.35" cy="0.3" r="0.5">
      <stop offset="0%" stop-color="#c8a0ff"/><stop offset="50%" stop-color="#8040cc"/><stop offset="100%" stop-color="#502080"/>
    </radialGradient>
    <!-- Drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="1.5" stdDeviation="1.5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <!-- Marble shine overlay -->
    <radialGradient id="shine" cx="0.3" cy="0.25" r="0.35">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Sack body — rounded bag shape -->
  <path d="M16 56 Q14 56 13 54 L11 38 Q10 28 14 22 L18 18 Q22 14 26 16 L38 16 Q42 14 46 18 L50 22 Q54 28 53 38 L51 54 Q50 56 48 56 Z"
        fill="url(#sack)" filter="url(#shadow)" stroke="#8a6520" stroke-width="0.8"/>
  <!-- Sack depth shading -->
  <path d="M16 56 Q14 56 13 54 L11 38 Q10 28 14 22 L18 18 Q22 14 26 16 L38 16 Q42 14 46 18 L50 22 Q54 28 53 38 L51 54 Q50 56 48 56 Z"
        fill="url(#sackShade)"/>

  <!-- Canvas texture lines -->
  <line x1="20" y1="20" x2="18" y2="54" stroke="#a07830" stroke-width="0.3" opacity="0.5"/>
  <line x1="28" y1="17" x2="26" y2="55" stroke="#a07830" stroke-width="0.3" opacity="0.5"/>
  <line x1="36" y1="17" x2="38" y2="55" stroke="#a07830" stroke-width="0.3" opacity="0.5"/>
  <line x1="44" y1="20" x2="46" y2="54" stroke="#a07830" stroke-width="0.3" opacity="0.5"/>

  <!-- Sack opening — folded rim at top -->
  <path d="M18 18 Q22 13 26 16 L38 16 Q42 13 46 18"
        fill="none" stroke="#8a6520" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Rolled-back rim effect -->
  <path d="M19 19 Q23 15 27 17 L37 17 Q41 15 45 19"
        fill="#c49540" stroke="#a07830" stroke-width="0.5" opacity="0.7"/>

  <!-- Rope/twine — loosely draped -->
  <path d="M22 20 Q18 14 20 10 Q22 7 26 9 Q28 10 27 13"
        fill="none" stroke="#8b7355" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M42 20 Q46 14 44 10 Q42 7 38 9 Q36 10 37 13"
        fill="none" stroke="#8b7355" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Rope knot area -->
  <ellipse cx="32" cy="11" rx="6" ry="3" fill="none" stroke="#8b7355" stroke-width="1.3"/>
  <!-- Loose rope ends -->
  <path d="M26 11 Q24 6 22 4" fill="none" stroke="#8b7355" stroke-width="1.2" stroke-linecap="round"/>
  <path d="M38 11 Q40 6 43 5" fill="none" stroke="#8b7355" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Visible marbles peeking out from the open top -->
  <!-- Red marble — left -->
  <circle cx="26" cy="16" r="5" fill="url(#mRed)" filter="url(#shadow)"/>
  <circle cx="26" cy="16" r="5" fill="url(#shine)"/>
  <ellipse cx="24" cy="14" rx="1.5" ry="1" fill="#fff" opacity="0.5"/>

  <!-- Blue marble — center -->
  <circle cx="34" cy="14" r="5.5" fill="url(#mBlue)" filter="url(#shadow)"/>
  <circle cx="34" cy="14" r="5.5" fill="url(#shine)"/>
  <ellipse cx="32" cy="12" rx="1.5" ry="1" fill="#fff" opacity="0.5"/>

  <!-- Green marble — right, slightly lower -->
  <circle cx="41" cy="17" r="4.5" fill="url(#mGreen)" filter="url(#shadow)"/>
  <circle cx="41" cy="17" r="4.5" fill="url(#shine)"/>
  <ellipse cx="39.5" cy="15.5" rx="1.2" ry="0.8" fill="#fff" opacity="0.45"/>

  <!-- Gold marble — peeking between red and blue -->
  <circle cx="30" cy="19" r="3.5" fill="url(#mGold)" filter="url(#shadow)"/>
  <circle cx="30" cy="19" r="3.5" fill="url(#shine)"/>
  <ellipse cx="28.8" cy="17.8" rx="1" ry="0.7" fill="#fff" opacity="0.45"/>

  <!-- Purple marble — peeking far left -->
  <circle cx="21" cy="19" r="3" fill="url(#mPurple)" filter="url(#shadow)"/>
  <circle cx="21" cy="19" r="3" fill="url(#shine)"/>
  <ellipse cx="19.8" cy="17.8" rx="0.9" ry="0.6" fill="#fff" opacity="0.4"/>

  <!-- One marble that rolled out — sitting beside the sack -->
  <circle cx="54" cy="54" r="4" fill="url(#mRed)" filter="url(#shadow)"/>
  <circle cx="54" cy="54" r="4" fill="url(#shine)"/>
  <ellipse cx="52.5" cy="52.5" rx="1.2" ry="0.8" fill="#fff" opacity="0.5"/>
</svg>
